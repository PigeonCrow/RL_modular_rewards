[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
known_first_party = ["your_package"]
default_section = "THIRDPARTY"

[tool.ruff]
line-length = 120
target-version = "py310"
lint.extend-select = ["E", "F", "W"]
lint.ignore = ["E203"]  # compatible with Black/isort layout decisions
exclude = ["venv", ".git", "__pycache__"]
